<!DOCTYPE html>
<html>

<head>
  <meta
    http-equiv="Content-Security-Policy"
    content="script-src 'nonce-aem' 'strict-dynamic' 'unsafe-inline' http: https:; base-uri 'self'; object-src 'none';"
    move-to-http-header="true"
  >
  <title>Page not found</title>
  <script nonce="aem" type="importmap">
    {
        "imports": {
            "@dropins/tools/": "/scripts/__dropins__/tools/",
            "@dropins/storefront-cart/": "/scripts/__dropins__/storefront-cart/",
            "@dropins/storefront-auth/": "/scripts/__dropins__/storefront-auth/",
            "@dropins/storefront-personalization/": "/scripts/__dropins__/storefront-personalization/"
        }
    }
  </script>
  <script nonce="aem" type="text/javascript">
    window.isErrorPage = true;
    window.errorCode = '404';
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="Page not found">
  <script nonce="aem" type="module">
    await fetch('/metadata.json')
      .then((res) => res.json())
      .then(({ data = [] }) => {
        const currentUrl = window.location.pathname;
        const match = data.find(entry => {
          const { URL, root, placeholders } = entry;
          const pattern = URL.replace("**", "(.*)");
          const regex = new RegExp(`^${pattern}$`);
          if (regex.test(currentUrl)) {
            return { root, placeholders };
          }
        });

        if (!match) return;

        const { root, placeholders } = match;

        if (root) {
          const rootMeta = document.createElement('meta');
          rootMeta.name = 'root';
          rootMeta.content = root;
          document.head.appendChild(rootMeta);
        }

        if (placeholders) {
          const placeholdersMeta = document.createElement('meta');
          placeholdersMeta.name = 'placeholders';
          placeholdersMeta.content = placeholders;
          document.head.appendChild(placeholdersMeta);
        }
      })
      .catch((err) => {
        console.error(err);
      });
  </script>
  <script nonce="aem" src="/scripts/scripts.js" type="module"></script>
  <script nonce="aem" type="module">
    window.addEventListener('load', () => {
      if (document.referrer) {
        const { origin, pathname } = new URL(document.referrer);
        if (origin === window.location.origin) {
          const backBtn = document.createElement('a');
          backBtn.classList.add('button', 'error-button-back');
          backBtn.href = pathname;
          backBtn.textContent = 'Go back';
          backBtn.title = 'Go back';
          const btnContainer = document.querySelector('.button-container');
          btnContainer.append(backBtn);
        }
      }
    });
  </script>
  <script nonce="aem" type="module">
    import { sampleRUM } from '/scripts/aem.js';
    sampleRUM('404', { source: document.referrer });
  </script>
  <link rel="stylesheet" href="/styles/styles.css">
  <style>
    main.error {
      align-items: center;
      display: flex;
      margin: 0 auto;
      max-width: 1264px;
      min-height: calc(100vh - var(--nav-height));
      padding: 0 32px;
      width: 100%;
    }

    main.error .error-number {
      width: 100%;
    }

    main.error .error-number text {
      font-family: monospace;
    }
  </style>
  <link rel="stylesheet" href="/styles/lazy-styles.css">


<!-- === Smart 404 PDP eager redirect (Demo Builder) === -->
<script nonce="aem">
  (function () {
    if (document.prerendering) return;
    var m = location.pathname.match(/^\/products\/([^/]+)\/([^/]+)$/);
    if (!m) return;
    var lc = '/products/' + m[1].toLowerCase() + '/' + m[2].toLowerCase();
    // Mixed case: redirect to lowercase before any paint
    if (lc !== location.pathname) {
      location.replace(lc);
      return;
    }
    // Already lowercase. If this is a 404 page (cold path: SKU never
    // published), the storefront's default 404 chrome will paint before
    // delayed.js loads and runs our cold-path snippet. Hide just the
    // <main> (not the whole body) so the storefront's header and footer
    // — populated by scripts.js as usual — stay visible while we wait.
    // User sees real storefront chrome around a loading area, not a
    // blank page. On non-404 pages window.isErrorPage is undefined so
    // we skip the hide.
    if (window.isErrorPage && !new URLSearchParams(location.search).has('pdpRetry')) {
      var s = document.createElement('style');
      s.id = 'smart-404-cold-hide';
      s.textContent = 'main { visibility: hidden; }';
      document.head.appendChild(s);
    }
  })();
</script>
<!-- === end Smart 404 PDP eager redirect === -->
</head>

<body>
  <header></header>
  <main class="error">
    <div class="section">
      <svg viewBox="1 0 38 18" class="error-number">
        <text x="0" y="17">404</text>
      </svg>
      <h2 class="error-message">Page Not Found</h2>
      <p class="button-container">
        <a href="/" class="button secondary error-button-home">Go home</a>
      </p>
    </div>
  </main>
  <footer></footer>
</body>

</html>
